name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Install the Supabase CLI for type generation / drift check.
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Static schema-shape checks (no network).
      - name: Verify generated Supabase types
        run: bun run db:types:verify

      # Regenerate types from the live schema and fail on any diff vs committed.
      - name: Check Supabase types drift
        if: ${{ env.VITE_SUPABASE_PROJECT_ID != '' && env.SUPABASE_ACCESS_TOKEN != '' }}
        run: bun run db:types:check

      - name: Run CI (typecheck, lint, test, build)
        run: bun run ci